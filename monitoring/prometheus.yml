global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: omniscience

scrape_configs:
  - job_name: omniscience-app
    static_configs:
      - targets:
          - app:8000
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: nats
    static_configs:
      - targets:
          - nats:8222
    metrics_path: /metrics
    scrape_interval: 15s
