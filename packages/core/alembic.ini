# Alembic configuration for omniscience-core
# Run from packages/core/: alembic upgrade head

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for generated migration timestamps
timezone = UTC

# Max length for migration revision slug
truncate_slug_length = 40

# Version path separator
version_path_separator = os

# The SQLAlchemy connection URL is sourced from the environment at runtime
# (see alembic/env.py which reads DATABASE_URL / Settings).
# Set here only as a fallback for tooling that reads alembic.ini directly.
sqlalchemy.url = postgresql+asyncpg://omniscience:omniscience@localhost:5432/omniscience

[post_write_hooks]
# No post-write hooks by default.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
