[project]
name = "omniscience-retrieval"
version = "0.1.0"
description = "Hybrid retrieval service (vector + BM25 + RRF) for Omniscience"
requires-python = ">=3.12"
dependencies = [
    "omniscience-core",
]

[tool.uv.sources]
omniscience-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/omniscience_retrieval"]
